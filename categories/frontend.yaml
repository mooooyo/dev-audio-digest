name: frontend
enabled: true
output: text

sources:
  core:
    chrome_developers:
      url: https://developer.chrome.com/blog/feed.xml
      type: rss
    github_releases:
      repos:
        - facebook/react
        - vercel/next.js
        - microsoft/TypeScript
      watch:
        - releases
    github_trending:
      language: javascript
      since: daily

    npm:
      packages:
        - react
        - react-dom
        - next
        - typescript
        - vite
        - svelte
        - tailwindcss
        - vue
        - angular
        - "@angular/core"
      alert_threshold: 20

  secondary:
    hackernews:
      min_score: 100
      keywords:
        - javascript
        - react
        - nextjs
        - typescript
        - css
        - frontend
    javascript_weekly:
      url: https://javascriptweekly.com/rss

  optional:
    devtools:
      keywords:
        - devtools
        - lighthouse
        - core-web-vitals

prompt: |
  프론트엔드 개발자 관점에서 블로그 포스트 형식으로 요약해줘.
  코드 변경사항은 코드블록으로, 링크는 원문 포함.
  breaking change나 deprecation은 반드시 강조.
